version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: godroox_postgres_dev
    environment:
      POSTGRES_USER: godroox
      POSTGRES_PASSWORD: godroox_dev_password
      POSTGRES_DB: godroox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U godroox"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - godroox_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: godroox_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - godroox_network

  # Next.js Application (Development Mode)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: godroox_app_dev
    environment:
      # Database
      DATABASE_URL: postgresql://godroox:godroox_dev_password@postgres:5432/godroox?schema=public
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:8081}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-key-change-in-production-min-32-chars-long}
      
      # App
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: "true"
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8081}
    ports:
      - "${APP_PORT:-8081}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - godroox_network
    command: sh -c "npx prisma generate && npm run dev"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  godroox_network:
    driver: bridge
