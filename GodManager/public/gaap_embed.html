<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAAP Statement — Manager Prop</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/gaap-1099.css" />
  <style>
    body { font-family: 'Sora', sans-serif; background: var(--sand, #faf7f2); padding: 1rem; margin: 0; }
  </style>
</head>
<body>
  <div id="gaap-period-header" class="gaap-period-header">Manager Prop · Period: —</div>

  <div class="gaap-toolbar">
    <label class="btn btn-sm mb-0" style="background:var(--gaap-navy);color:#fff;cursor:pointer;">
      Upload CSV
      <input id="gaap-csv-input" type="file" accept=".csv" hidden />
    </label>
    <button type="button" id="gaap-btn-process" class="btn btn-sm btn-success" disabled title="Selecione um CSV">Processar</button>
    <span class="gaap-status" id="gaap-status">Pronto · dados em localStorage (<code>mp_gaap_data_v2</code>)</span>
    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.gaapExpandAll()">Expandir tudo</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.gaapCollapseAll()">Recolher tudo</button>
    <button type="button" class="btn btn-sm btn-outline-primary" onclick="window.gaapExportCsv()">Export CSV</button>
    <button type="button" class="btn btn-sm btn-outline-danger" onclick="window.gaapReset()">Reset</button>
  </div>

  <div class="gaap-kpi-grid">
    <div class="gaap-kpi-card gaap-kpi--green">
      <div class="gaap-kpi-label">Total Receitas · ASC 606</div>
      <div class="gaap-kpi-val" id="kpi-total-rev">$0.00</div>
      <div class="gaap-kpi-sub" id="kpi-total-rev-sub">recv + income</div>
    </div>
    <div class="gaap-kpi-card gaap-kpi--navy">
      <div class="gaap-kpi-label">Total Income</div>
      <div class="gaap-kpi-val" id="kpi-income">$0.00</div>
      <div class="gaap-kpi-sub" id="kpi-income-sub">Operating revenue</div>
    </div>
    <div class="gaap-kpi-card gaap-kpi--amber">
      <div class="gaap-kpi-label">Gross Profit · ASC 330</div>
      <div class="gaap-kpi-val" id="kpi-gross">$0.00</div>
      <div class="gaap-kpi-sub" id="kpi-gross-sub">—</div>
    </div>
    <div class="gaap-kpi-card gaap-kpi--amber">
      <div class="gaap-kpi-label">Operating Income · ASC 720/225</div>
      <div class="gaap-kpi-val" id="kpi-op">$0.00</div>
      <div class="gaap-kpi-sub" id="kpi-op-sub">—</div>
    </div>
    <div class="gaap-kpi-card gaap-kpi--green">
      <div class="gaap-kpi-label">Net Income</div>
      <div class="gaap-kpi-val" id="kpi-net">$0.00</div>
      <div class="gaap-kpi-sub" id="kpi-net-sub">—</div>
    </div>
    <div class="gaap-kpi-card gaap-kpi--navy">
      <div class="gaap-kpi-label">Free Cash Flow · ASC 230</div>
      <div class="gaap-kpi-val" id="kpi-fcf">$0.00</div>
      <div class="gaap-kpi-sub" id="kpi-fcf-sub">—</div>
    </div>
  </div>

  <div id="gaap-sections-host"></div>
  <script src="/js/gaap_module.js" defer></script>
</body>
</html>
