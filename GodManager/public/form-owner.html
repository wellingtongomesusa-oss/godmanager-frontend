<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodManager — Owner Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#141416;--paper:#1c1c1f;--border:rgba(201,169,110,.28);--champagne:#c9a96e;--champagne-dim:rgba(201,169,110,.45);--ink:#f4f1ec;--ink2:rgba(244,241,236,.72);--ink3:rgba(244,241,236,.45);--red:#c94a4a;--green:#2d7252}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,169,110,.09),transparent 55%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:28px 20px 48px}
.brand{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.brand h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--champagne);letter-spacing:.02em}
.brand .sub{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.12em}
.lang{display:flex;gap:6px}
.lang button{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.lang button.on{background:rgba(201,169,110,.14);color:var(--champagne);border-color:var(--champagne-dim)}
.panel{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:22px 22px 20px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.panel h2{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px}
.panel .lead{font-size:12px;color:var(--ink3);margin-bottom:18px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:9.5px;font-weight:600;letter-spacing:.55px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.fg input{width:100%;padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:#121214;color:var(--ink);font-size:13px;font-family:inherit}
.fg input:focus{outline:none;border-color:var(--champagne-dim);box-shadow:0 0 0 3px rgba(201,169,110,.12)}
.progress-wrap{margin:18px 0 14px}
.progress-h{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.progress-bar{height:8px;background:#121214;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.progress-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--champagne),#8a7348);width:0;transition:width .25s ease}
.doc-grid{display:grid;gap:10px;margin-top:14px}
.doc-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:#121214}
.doc-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.doc-ico.bad{color:var(--red);border:1px solid rgba(201,74,74,.45);background:rgba(201,74,74,.1)}
.doc-ico.ok{color:#8fd4b0;border:1px solid rgba(45,114,82,.5);background:rgba(45,114,82,.15)}
.doc-meta{flex:1;min-width:0}
.doc-meta .t{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px}
.doc-meta .f{font-size:11px;color:var(--ink3)}
.doc-meta input[type=file]{margin-top:8px;font-size:11px;color:var(--ink2)}
.err-box{padding:14px;border-radius:10px;border:1px solid rgba(201,74,74,.4);background:rgba(201,74,74,.08);font-size:12px;color:#f0c4c4}
.info-box{padding:14px;border-radius:10px;border:1px solid var(--border);background:rgba(201,169,110,.06);font-size:12px;color:var(--ink2)}
.btn-prim{margin-top:18px;width:100%;padding:12px 16px;border:none;border-radius:8px;background:var(--champagne);color:#121214;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(201,169,110,.25)}
.btn-prim:disabled{opacity:.45;cursor:not-allowed}
.ref-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);color:var(--champagne);margin-top:8px}
.wm{text-align:center;font-size:10px;color:rgba(201,169,110,.22);margin-top:32px;font-family:'Cormorant Garamond',serif}
</style>
</head>
<body>
<div class="wrap">
 <header class="brand">
 <div>
 <h1>GodManager</h1>
 <div class="sub" data-i18n="tag">Owner registration</div>
 </div>
 <div class="lang" id="lang-bar">
 <button type="button" data-lang="en" class="on">EN</button>
 <button type="button" data-lang="pt">PT</button>
 <button type="button" data-lang="es">ES</button>
 </div>
 </header>
 <div id="app"></div>
 <p class="wm">godmanager.com</p>
</div>
<script>
(function(){
 var FORM='owner';
 var I18N={
  tag:{en:'Owner registration',pt:'Registro de proprietário',es:'Registro de propietario'},
  title:{en:'Owner information',pt:'Informações do proprietário',es:'Información del propietario'},
  lead:{en:'Upload the requested documents. Your reference is shown below.',pt:'Envie os documentos solicitados. Sua referência aparece abaixo.',es:'Suba los documentos solicitados. Su referencia aparece abajo.'},
  fullName:{en:'Full legal name',pt:'Nome legal completo',es:'Nombre legal completo'},
  email:{en:'Email',pt:'E-mail',es:'Correo'},
  phone:{en:'Phone',pt:'Telefone',es:'Teléfono'},
  docProgress:{en:'Documents',pt:'Documentos',es:'Documentos'},
  submit:{en:'Submit',pt:'Enviar',es:'Enviar'},
  invalid:{en:'This link is invalid or expired.',pt:'Este link é inválido ou expirou.',es:'Este enlace no es válido o expiró.'},
  submitted:{en:'This form was already submitted.',pt:'Este formulário já foi enviado.',es:'Este formulario ya fue enviado.'},
  preview:{en:'Preview mode — not saved.',pt:'Modo pré-visualização — não salva.',es:'Vista previa — no se guarda.'},
  uploading:{en:'Uploading…',pt:'Enviando…',es:'Subiendo…'},
  netErr:{en:'Network error.',pt:'Erro de rede.',es:'Error de red.'}
 };
 var lang=localStorage.getItem('gm_form_lang')||'en';
 var state={token:'',ref:'',checklist:[],documents:{},verify:null};

 function apiBase(){
  if(window.GM_FORM_API)return String(window.GM_FORM_API).replace(/\/$/,'');
  var h=location.hostname;
  if(h==='localhost'||h==='127.0.0.1')return 'http://127.0.0.1:5000';
  return 'https://godmanager-production.up.railway.app';
 }
 function t(k){var o=I18N[k];return o&&(o[lang]||o.en)||k;}
 function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

 function setLang(l){
  lang=l;localStorage.setItem('gm_form_lang',l);
  document.querySelectorAll('.lang button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-lang')===l);});
  var st=document.querySelector('.brand .sub');if(st)st.textContent=t('tag');
  render();
 }
 document.getElementById('lang-bar').addEventListener('click',function(ev){
  var b=ev.target.closest('button[data-lang]');if(!b)return;setLang(b.getAttribute('data-lang'));
 });

 function docDone(key){var d=state.documents[key];return d&&d.filename;}
 function progressPct(){
  var c=state.checklist.length;if(!c)return 0;
  var n=state.checklist.filter(function(x){return docDone(x.key);}).length;
  return Math.round(100*n/c);
 }

 function render(){
  var app=document.getElementById('app');
  var params=new URLSearchParams(location.search);
  if(params.get('preview')==='1'){
   app.innerHTML='<div class="panel"><h2>'+esc(t('title'))+'</h2><p class="lead">'+esc(t('preview'))+'</p><div class="info-box">OWN-2026-0001 · '+esc(t('lead'))+'</div><div class="doc-grid">'+
    ['gov_id','w9','deed','insurance'].map(function(k,i){
     return '<div class="doc-card"><div class="doc-ico bad">✕</div><div class="doc-meta"><div class="t">Document '+(i+1)+'</div><div class="f">PDF / JPG</div></div></div>';
    }).join('')+'</div><button class="btn-prim" type="button" disabled>'+esc(t('submit'))+'</button></div>';
   return;
  }
  var tok=(params.get('token')||'').trim();
  if(!tok){app.innerHTML='<div class="panel err-box">'+esc(t('invalid'))+'</div>';return;}
  if(!state.verify&&tok){
   app.innerHTML='<div class="panel info-box">Loading…</div>';
   fetch(apiBase()+'/api/appfolio/form/verify/'+encodeURIComponent(tok),{method:'GET',mode:'cors',credentials:'omit'})
   .then(function(r){return r.json();})
   .then(function(j){
    state.verify=j;state.token=tok;
    if(!j||j.valid===false){app.innerHTML='<div class="panel err-box">'+esc(t('invalid'))+'</div>';return;}
    state.ref=j.ref||'';
    if(j.status&&j.status!=='pending'&&j.message){
     app.innerHTML='<div class="panel info-box">'+esc(j.message)+'</div>';
     return;
    }
    state.checklist=Array.isArray(j.checklist)?j.checklist:[];
    renderForm();
   }).catch(function(){app.innerHTML='<div class="panel err-box">'+esc(t('netErr'))+'</div>';});
   return;
  }
  if(state.verify)renderForm();
 }

 function labelFor(item){
  var lb=item&&item.labels;if(!lb)return item.key;
  return lb[lang]||lb.en||item.key;
 }

 function renderForm(){
  var app=document.getElementById('app');
  var j=state.verify;
  var pct=progressPct();
  var done=state.checklist.filter(function(x){return docDone(x.key);}).length;
  var total=state.checklist.length||1;
  var html='';
  html+='<div class="panel"><h2>'+esc(t('title'))+'</h2><p class="lead">'+esc(t('lead'))+'</p>';
  if(state.ref)html+='<div class="ref-pill">'+esc(state.ref)+'</div>';
  html+='<div class="fg"><label>'+esc(t('fullName'))+'</label><input id="f-name" value="'+esc(j.recipient_name||'')+'"></div>';
  html+='<div class="fg"><label>'+esc(t('email'))+'</label><input id="f-email" type="email"></div>';
  html+='<div class="fg"><label>'+esc(t('phone'))+'</label><input id="f-phone"></div>';
  html+='<div class="progress-wrap"><div class="progress-h"><span>'+esc(t('docProgress'))+'</span><span>'+done+' / '+total+'</span></div><div class="progress-bar"><i style="width:'+pct+'%"></i></div></div>';
  html+='<div class="doc-grid">';
  state.checklist.forEach(function(item){
   var ok=docDone(item.key);
   html+='<div class="doc-card"><div class="doc-ico '+(ok?'ok':'bad')+'">'+(ok?'✓':'✕')+'</div><div class="doc-meta"><div class="t">'+esc(labelFor(item))+'</div>';
   if(ok)html+='<div class="f">'+esc(state.documents[item.key].filename)+'</div>';
   html+='<input type="file" data-key="'+esc(item.key)+'" accept=".pdf,.jpg,.jpeg,.png"></div></div>';
  });
  html+='</div><button type="button" class="btn-prim" id="btn-submit">'+esc(t('submit'))+'</button></div>';
  app.innerHTML=html;
  app.querySelectorAll('input[type=file]').forEach(function(inp){
   inp.addEventListener('change',function(){
    var key=inp.getAttribute('data-key');if(!key||!inp.files||!inp.files[0])return;
    var fd=new FormData();fd.append('token',state.token);fd.append('doc_key',key);fd.append('file',inp.files[0]);
    fetch(apiBase()+'/api/appfolio/form/upload-doc',{method:'POST',mode:'cors',credentials:'omit',body:fd})
    .then(function(r){return r.json();})
    .then(function(o){
     if(!o||!o.ok)return;
     state.documents[key]={filename:o.filename||inp.files[0].name,size:o.size||0};
     renderForm();
    }).catch(function(){alert(t('netErr'));});
   });
  });
  var btn=document.getElementById('btn-submit');
  if(btn)btn.addEventListener('click',submit);
 }

 function submit(){
  var nm=document.getElementById('f-name');var em=document.getElementById('f-email');var ph=document.getElementById('f-phone');
  var payload={
   token:state.token,
   ref:state.ref||'',
   full_name:nm?nm.value.trim():'',
   email:em?em.value.trim():'',
   phone:ph?ph.value.trim():'',
   type:'owner',
   documents:state.documents
  };
  fetch(apiBase()+'/api/appfolio/form/owner',{method:'POST',mode:'cors',credentials:'omit',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
  .then(function(o){
   if(!o.ok){alert((o.j&&o.j.error)||'Error');return;}
   document.getElementById('app').innerHTML='<div class="panel info-box">Thank you. Reference: '+esc(o.j.ref||state.ref||'')+'</div>';
  }).catch(function(){alert(t('netErr'));});
 }

 render();
})();
</script>
</body>
</html>
