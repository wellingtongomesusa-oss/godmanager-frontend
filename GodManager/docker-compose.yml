# Postgres local para desenvolvimento (login, Prisma, etc.)
# Uso:
#   docker compose up -d
# No .env.local:
#   DATABASE_URL="postgresql://godmanager:godmanager@127.0.0.1:5433/godmanager?schema=public"
#   (5433 evita conflito com Postgres nativo do macOS em localhost:5432)
# Depois:
#   npx prisma migrate deploy
#   npm run seed:demo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: godmanager
      POSTGRES_PASSWORD: godmanager
      POSTGRES_DB: godmanager
    ports:
      - '5433:5432'
    volumes:
      - godmanager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U godmanager -d godmanager']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  godmanager_pgdata:
